<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoy Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #111114;
            --panel: #1a1a1f;
            --field: #212127;
            --line: #2c2c33;
            --text: #eeece7;
            --muted: #8f8e97;
            --accent: #ff5a36;
            --mono: 'JetBrains Mono', monospace;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            --display: 'Space Grotesk', sans-serif;
            --gap: clamp(12px, 2.5vw, 20px);
            --pad: clamp(14px, 3vw, 24px);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
        }

        .wrap {
            max-width: 1320px;
            margin: 0 auto;
            padding: var(--pad);
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--line);
            padding-bottom: 16px;
            margin-bottom: var(--gap);
        }

        .brand {
            font-family: var(--display);
            font-weight: 700;
            font-size: clamp(20px, 3vw, 26px);
            letter-spacing: -.01em;
        }

        .brand span {
            color: var(--accent);
        }

        .layout {
            display: grid;
            grid-template-areas: "preview" "controls";
            gap: var(--gap);
        }

        @media (min-width:1024px) {
            .layout {
                grid-template-areas: "controls preview";
                grid-template-columns: 340px 1fr;
                align-items: start;
            }
        }

        @media (min-width:1440px) {
            .wrap {
                max-width: 1440px;
            }

            .layout {
                gap: 32px;
            }

            .panel {
                padding: 26px;
            }

            .preview-stage {
                min-height: 420px;
            }
        }

        .panel {
            grid-area: controls;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: var(--pad);
            min-width: 0;
        }

        .preview-panel {
            grid-area: preview;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .label {
            font-family: var(--mono);
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin: 18px 0 8px;
        }

        .label:first-child {
            margin-top: 0;
        }

        .fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
            gap: 10px 12px;
            min-width: 0;
        }

        .field {
            margin-bottom: 0;
            min-width: 0;
        }

        .field.full {
            grid-column: 1/-1;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input[type=text],
        select {
            width: 100%;
            background: var(--field);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 7px;
            padding: 9px 10px;
            font-size: 13.5px;
            font-family: inherit;
            outline: none;
        }

        input[type=text]:focus,
        select:focus {
            border-color: var(--accent);
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        input[type=range] {
            flex: 1;
            min-width: 0;
            accent-color: var(--accent);
            height: 3px;
        }

        .range-val {
            font-family: var(--mono);
            font-size: 11.5px;
            width: 34px;
            text-align: right;
            color: var(--text);
            flex-shrink: 0;
        }

        input[type=color] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: none;
            padding: 2px;
            cursor: pointer;
        }

        input[type=color]::-webkit-color-swatch {
            border-radius: 5px;
            border: none;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--field);
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 9px 11px;
            grid-column: 1/-1;
        }

        .toggle-row span {
            font-size: 12.5px;
        }

        .switch {
            width: 34px;
            height: 19px;
            background: #34343c;
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s;
        }

        .switch.on {
            background: var(--accent);
        }

        .switch::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            transition: transform .15s;
        }

        .switch.on::after {
            transform: translateX(15px);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width:380px) {
            .actions {
                flex-direction: column;
            }
        }

        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 13.5px;
            border: none;
            border-radius: 7px;
            padding: 11px 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: #160f08;
            flex: 1;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--line);
            flex: 1;
        }

        .btn-secondary:disabled {
            opacity: .45;
            cursor: not-allowed;
        }

        .hint {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.5;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
        }

        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--field);
            padding: clamp(16px, 4vw, 32px);
            min-height: 260px;
        }

        .stage-empty {
            text-align: center;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 12.5px;
            line-height: 1.6;
            max-width: 260px;
        }

        .stage-empty b {
            color: var(--text);
        }

        #stageContent svg {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
        }

        .status-bar {
            padding: 9px var(--pad);
            border-top: 1px solid var(--line);
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-bar b {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="wrap">

        <header>
            <div class="brand">DECOY TEXT</div>
        </header>

        <div class="layout">

            <div class="panel">

                <div class="label">Teks</div>
                <div class="fields">
                    <div class="field full">
                        <label for="bgTextInput">Teks latar <span id="bgLenHint" style="opacity:.6;">(maks. 10
                                karakter)</span></label>
                        <input type="text" id="bgTextInput" value="BACKGROUND" maxlength="10">
                    </div>
                    <div class="field full">
                        <label for="frontTextInput">Teks decoy (depan)</label>
                        <input type="text" id="frontTextInput" value="DECOY TEXT" maxlength="40">
                    </div>
                    <div class="field">
                        <label for="sizePreset">Ukuran</label>
                        <select id="sizePreset">
                            <option value="1200x400">Lebar 1200×400</option>
                            <option value="1080x1080">Persegi 1080²</option>
                            <option value="1080x1350">Potret 1080×1350</option>
                        </select>
                    </div>
                </div>

                <div class="label">Latar (blur seluruh background)</div>
                <div class="fields">
                    <div class="field">
                        <label>Blur</label>
                        <div class="range-row">
                            <input type="range" id="bgBlur" min="10" max="30" value="10">
                            <span class="range-val" id="bgBlurVal">10px</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Opasitas teks</label>
                        <div class="range-row">
                            <input type="range" id="bgOpacity" min="0" max="100" value="70">
                            <span class="range-val" id="bgOpacityVal">70%</span>
                        </div>
                    </div>
                </div>

                <div class="label">Garis kontur (teks depan)</div>
                <div class="fields">
                    <div class="field">
                        <label>Jml. garis</label>
                        <div class="range-row">
                            <input type="range" id="ringCount" min="2" max="14" value="7">
                            <span class="range-val" id="ringCountVal">7</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Jarak</label>
                        <div class="range-row">
                            <input type="range" id="ringSpacing" min="2" max="14" value="6">
                            <span class="range-val" id="ringSpacingVal">6px</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Tebal</label>
                        <div class="range-row">
                            <input type="range" id="ringThickness" min="1" max="6" value="2">
                            <span class="range-val" id="ringThicknessVal">2px</span>
                        </div>
                    </div>
                    <div class="toggle-row">
                        <span>Glow lembut</span>
                        <div class="switch on" id="glowToggle"></div>
                    </div>
                </div>

                <div class="label">Warna</div>
                <div class="fields">
                    <div class="field">
                        <label for="bgColor">Latar</label>
                        <input type="color" id="bgColor" value="#050505">
                    </div>
                    <div class="field">
                        <label for="frontColor">Depan</label>
                        <input type="color" id="frontColor" value="#3c3c3c">
                    </div>
                    <div class="field">
                        <label for="canvasBg">Kanvas</label>
                        <input type="color" id="canvasBg" value="#ffffff">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-primary" id="generateBtn">Generate</button>
                    <button class="btn-secondary" id="downloadBtn" disabled>Unduh PNG</button>
                </div>

                <div class="hint">
                    Semua proses render berjalan secara lokal di perangkat Anda.
                </div>
            </div>

            <div class="preview-panel">
                <div class="preview-stage">
                    <div id="stageContent">
                        <div class="stage-empty">
                            Belum ada hasil.<br>
                            Atur teks &amp; parameter di panel, lalu klik <b>Generate</b>.
                        </div>
                    </div>
                </div>
                <div class="status-bar">
                    <span id="statusLeft">status: menunggu input</span>
                    <span id="statusRight">1200 × 400</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        (function () {
            const $ = (id) => document.getElementById(id);
            const FONT_FAMILY = "'Archivo Black', sans-serif";

            const bgTextInput = $('bgTextInput');
            const frontTextInput = $('frontTextInput');
            const sizePreset = $('sizePreset');
            const bgBlur = $('bgBlur');
            const bgOpacity = $('bgOpacity');
            const ringCount = $('ringCount');
            const ringSpacing = $('ringSpacing');
            const ringThickness = $('ringThickness');
            const glowToggle = $('glowToggle');
            const bgColor = $('bgColor');
            const frontColor = $('frontColor');
            const canvasBg = $('canvasBg');
            const generateBtn = $('generateBtn');
            const downloadBtn = $('downloadBtn');
            const stageContent = $('stageContent');
            const statusLeft = $('statusLeft');
            const statusRight = $('statusRight');

            const bgLenHint = $('bgLenHint');

            // background text must never be longer than the decoy (front) text
            function syncBgTextLimit() {
                const limit = Math.max(1, frontTextInput.value.length);
                bgTextInput.maxLength = limit;
                if (bgTextInput.value.length > limit) {
                    bgTextInput.value = bgTextInput.value.slice(0, limit);
                }
                bgLenHint.textContent = `(maks. ${limit} karakter)`;
            }
            frontTextInput.addEventListener('input', syncBgTextLimit);
            bgTextInput.addEventListener('input', () => {
                const limit = Math.max(1, frontTextInput.value.length);
                if (bgTextInput.value.length > limit) {
                    bgTextInput.value = bgTextInput.value.slice(0, limit);
                }
            });
            syncBgTextLimit();

            let glowOn = true;
            glowToggle.addEventListener('click', () => {
                glowOn = !glowOn;
                glowToggle.classList.toggle('on', glowOn);
            });

            const bindRange = (el, out, suffix) => {
                const update = () => out.textContent = el.value + (suffix || '');
                el.addEventListener('input', update);
                update();
            };
            bindRange(bgBlur, $('bgBlurVal'), 'px');
            bindRange(bgOpacity, $('bgOpacityVal'), '%');
            bindRange(ringCount, $('ringCountVal'), '');
            bindRange(ringSpacing, $('ringSpacingVal'), 'px');
            bindRange(ringThickness, $('ringThicknessVal'), 'px');

            let lastPngUrl = null;

            function escapeXml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function buildContourFilter(id, count, spacing, thickness, blurSoft) {
                let prims = '';
                let mergeNodes = '';
                for (let i = 0; i < count; i++) {
                    const rInner = i * spacing;
                    const rOuter = rInner + thickness;
                    const innerRadius = rInner <= 0 ? 0.02 : rInner;
                    prims += `<feMorphology in="SourceGraphic" operator="dilate" radius="${rOuter.toFixed(2)}" result="dOut${i}"/>`;
                    prims += `<feMorphology in="SourceGraphic" operator="dilate" radius="${innerRadius.toFixed(2)}" result="dIn${i}"/>`;
                    prims += `<feComposite in="dOut${i}" in2="dIn${i}" operator="xor" result="ring${i}"/>`;
                    mergeNodes += `<feMergeNode in="ring${i}"/>`;
                }
                return `
    <filter id="${id}" x="-60%" y="-60%" width="220%" height="220%">
      ${prims}
      <feMerge result="ringsMerged">${mergeNodes}</feMerge>
      <feGaussianBlur in="ringsMerged" stdDeviation="${blurSoft}"/>
    </filter>`;
            }

            function buildSvg(opts) {
                const {
                    w, h, bgText, frontText, fontFamily,
                    bgBlurPx, bgOpac, count, spacing, thickness,
                    showGlow, colBg, colFront, colCanvas
                } = opts;

                const bgFontSize = h * 0.62;
                const frontFontSize = h * 0.42;
                const frontTextLength = w * 0.82;
                const bgTextLength = frontTextLength; // background must never span wider than the decoy text

                const filterId = 'contourFilter';
                const contourDefs = buildContourFilter(filterId, count, spacing, thickness, 0.5);

                return `
<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <defs>
    <filter id="bgBlurFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="${bgBlurPx}"/>
    </filter>
    <filter id="glowFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="${Math.max(4, spacing * 1.4)}"/>
    </filter>
    ${contourDefs}
  </defs>

  <!-- entire background (fill + text) blurred together as one plate -->
  <g filter="url(#bgBlurFilter)">
    <rect x="-15%" y="-15%" width="130%" height="130%" fill="${colCanvas}"/>
    <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
          font-family="${fontFamily}" font-weight="900"
          font-size="${bgFontSize}" letter-spacing="2"
          textLength="${bgTextLength}" lengthAdjust="spacingAndGlyphs"
          fill="${colBg}" opacity="${bgOpac}">${escapeXml(bgText)}</text>
  </g>

  ${showGlow ? `
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="${fontFamily}" font-weight="900"
        font-size="${frontFontSize}" letter-spacing="1"
        textLength="${frontTextLength}" lengthAdjust="spacingAndGlyphs"
        fill="${colFront}" opacity="0.45"
        filter="url(#glowFilter)">${escapeXml(frontText)}</text>` : ''}

  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="${fontFamily}" font-weight="900"
        font-size="${frontFontSize}" letter-spacing="1"
        textLength="${frontTextLength}" lengthAdjust="spacingAndGlyphs"
        fill="${colFront}"
        filter="url(#${filterId})">${escapeXml(frontText)}</text>
</svg>`;
            }

            function currentOptions() {
                const [w, h] = sizePreset.value.split('x').map(Number);
                const frontText = frontTextInput.value || 'DECOY';
                let bgText = bgTextInput.value || 'BACKGROUND';
                if (bgText.length > frontText.length) {
                    bgText = bgText.slice(0, frontText.length);
                }
                return {
                    w, h,
                    bgText,
                    frontText,
                    fontFamily: FONT_FAMILY,
                    bgBlurPx: Math.max(10, Number(bgBlur.value)),
                    bgOpac: Number(bgOpacity.value) / 100,
                    count: Number(ringCount.value),
                    spacing: Number(ringSpacing.value),
                    thickness: Number(ringThickness.value),
                    showGlow: glowOn,
                    colBg: bgColor.value,
                    colFront: frontColor.value,
                    colCanvas: canvasBg.value
                };
            }

            function render() {
                const opts = currentOptions();
                const svgString = buildSvg(opts);

                stageContent.innerHTML = svgString;
                statusLeft.textContent = 'status: berhasil dirender';
                statusRight.textContent = `${opts.w} × ${opts.h} · rings ${opts.count}`;

                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = function () {
                    const scale = 2;
                    const canvas = document.createElement('canvas');
                    canvas.width = opts.w * scale;
                    canvas.height = opts.h * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = opts.colCanvas;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    URL.revokeObjectURL(url);
                    canvas.toBlob(function (pngBlob) {
                        if (lastPngUrl) URL.revokeObjectURL(lastPngUrl);
                        lastPngUrl = URL.createObjectURL(pngBlob);
                        downloadBtn.disabled = false;
                    }, 'image/png');
                };
                img.onerror = function () {
                    statusLeft.textContent = 'status: gagal menyiapkan PNG (pratinjau tetap tampil)';
                };
                img.src = url;
            }

            generateBtn.addEventListener('click', render);

            function randomFileName(len) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let out = '';
                for (let i = 0; i < len; i++) {
                    out += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return out;
            }

            downloadBtn.addEventListener('click', () => {
                if (!lastPngUrl) return;
                const a = document.createElement('a');
                a.href = lastPngUrl;
                a.download = `${randomFileName(30)}.png`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            });

        })();
    </script>
</body>

</html>
